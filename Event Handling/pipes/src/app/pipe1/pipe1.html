<div>
    <p>Unformatted date: <strong>{{today}}</strong></p>
    <p>Formatted date: <strong>{{ today | date:'fullDate' }}</strong></p>
    <p>Unformatted amount: <strong>{{amount}}</strong></p>
    <p>Formatted amount: <strong>{{amount| number }}</strong></p>
    <p>Unformatted percent: <strong>{{percent}}</strong></p>
    <p>Formatted percent: <strong>{{percent| percent }}</strong></p>
</div>
