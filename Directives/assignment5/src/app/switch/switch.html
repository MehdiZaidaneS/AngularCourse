<div>
    <div>
        <button (click)="toggleValue('default')">Default</button>
        <button (click)="toggleValue('case1')">Name</button>
        <button (click)="toggleValue('case2')">Last</button>

    </div>

    <div [ngSwitch]="value">
        <div *ngSwitchCase="'case1'">This is my name</div>
        <div *ngSwitchCase="'case2'">This is my last name</div>
        <div *ngSwitchDefault>This is my default message</div>

    </div>

</div>
