<div>
  <h1>Property and Event Binding</h1>

  <button
    (click)="onButtonClick()"
    [style.backgroundColor]="active ? 'green' : 'red'">
    Press Me
  </button>

  <div *ngIf="active">
    <p>{{ message }}</p>

    <input
      id="message"
      [(ngModel)]="message"
      placeholder="message" />
  </div>
</div>
